server {
  listen 8080;
  server_name localhost;
  resolver 127.0.0.11 ipv6=off valid=10s;

  root /usr/share/nginx/html;
  index index.html;

  set $upload_upstream upload-api:8081;
  set $results_upstream results-api:8082;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/upload {
    proxy_pass https://$upload_upstream/upload;
    proxy_ssl_server_name on;
    proxy_ssl_name upload-api;
    proxy_ssl_trusted_certificate /etc/nginx/pki/ca.crt;
    proxy_ssl_certificate /etc/nginx/pki/client.crt;
    proxy_ssl_certificate_key /etc/nginx/pki/client.key;
    proxy_ssl_verify on;
  }

  location ~ ^/api/results/(.+) {
    proxy_pass https://$results_upstream/results/$1;
    proxy_ssl_server_name on;
    proxy_ssl_name results-api;
    proxy_ssl_trusted_certificate /etc/nginx/pki/ca.crt;
    proxy_ssl_certificate /etc/nginx/pki/client.crt;
    proxy_ssl_certificate_key /etc/nginx/pki/client.key;
    proxy_ssl_verify on;
  }

  location /api/alert {
    proxy_set_header X-Webhook-Secret change-me;
    proxy_pass http://zeroresponder:8090/alert;
  }

  location /api/health/upload {
    proxy_pass https://$upload_upstream/health;
    proxy_ssl_server_name on;
    proxy_ssl_name upload-api;
    proxy_ssl_trusted_certificate /etc/nginx/pki/ca.crt;
    proxy_ssl_certificate /etc/nginx/pki/client.crt;
    proxy_ssl_certificate_key /etc/nginx/pki/client.key;
    proxy_ssl_verify on;
  }

  location /api/health/results {
    proxy_pass https://$results_upstream/health;
    proxy_ssl_server_name on;
    proxy_ssl_name results-api;
    proxy_ssl_trusted_certificate /etc/nginx/pki/ca.crt;
    proxy_ssl_certificate /etc/nginx/pki/client.crt;
    proxy_ssl_certificate_key /etc/nginx/pki/client.key;
    proxy_ssl_verify on;
  }

  location /api/health/zeroresponder {
    proxy_pass http://zeroresponder:8090/health;
  }
}
